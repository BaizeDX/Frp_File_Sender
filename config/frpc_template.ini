[common]
# frp服务器地址（请替换为实际的frp服务器）
server_addr = your-frp-server.com
server_port = 7000

# 认证令牌
token = your_token_here

# 管理端口
admin_addr = 127.0.0.1
admin_port = 7400
admin_user = admin
admin_pwd = admin

# 日志
log_file = ./logs/frpc.log
log_level = info
log_max_days = 3

[file-transfer]
type = tcp
local_ip = 127.0.0.1
local_port = {local_port}
remote_port = {remote_port}
use_encryption = true
use_compression = true