<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发送文件 - FileP2P</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#667eea;--success:#48bb78;--danger:#f56565;--bg:#f7fafc;--card:#fff;--text:#2d3748;--light:#718096;--border:#e2e8f0;--radius:12px}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh}
        .container{max-width:800px;margin:0 auto;padding:20px}
        .navbar{background:rgba(255,255,255,.95);border-radius:var(--radius);padding:15px 25px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .nav-brand{font-size:22px;font-weight:700;color:var(--primary);text-decoration:none}
        .nav-links a{color:var(--text);text-decoration:none;padding:8px 16px;border-radius:8px;margin-left:5px;transition:.3s}
        .nav-links a:hover,.nav-links a.active{background:var(--primary);color:white}
        .card{background:var(--card);border-radius:var(--radius);padding:30px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.1);animation:fadeIn .3s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .info-icon{font-size:64px;text-align:center;margin-bottom:15px}
        h2{color:var(--text);margin-bottom:10px}
        h3{color:var(--text);margin-bottom:15px}
        h4{color:var(--text);margin-bottom:10px}
        .instruction-list{text-align:left;display:inline-block;margin:15px auto;line-height:2;padding-left:20px}
        .path-highlight{background:#ffeaa7;padding:3px 8px;border-radius:4px;font-weight:bold}
        .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:.3s;display:inline-flex;align-items:center;gap:6px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
        .btn-primary{background:var(--primary);color:white}
        .btn-secondary{background:var(--border);color:var(--text)}
        .btn-danger{background:var(--danger);color:white}
        .btn-success{background:var(--success);color:white}
        .btn-large{padding:14px 30px;font-size:16px;width:100%;justify-content:center;margin-top:15px}
        .btn-sm{padding:6px 12px!important;font-size:12px!important}
        
        /* 访问码设置 */
        .access-code-section{background:#f8f9fa;border-radius:12px;padding:20px;margin:20px 0;text-align:left;border:2px dashed var(--border)}
        .toggle-row{display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:15px}
        .toggle-switch{position:relative;width:48px;height:26px;flex-shrink:0}
        .toggle-switch input{display:none}
        .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#cbd5e0;border-radius:13px;transition:.3s}
        .slider::after{content:'';position:absolute;width:22px;height:22px;background:white;border-radius:50%;top:2px;left:2px;transition:.3s}
        .toggle-switch input:checked+.slider{background:var(--success)}
        .toggle-switch input:checked+.slider::after{left:24px}
        .toggle-label{font-weight:600;font-size:15px}
        
        .code-controls{margin-top:15px;display:none}
        .code-controls.show{display:block}
        .code-input-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .code-input{flex:1;min-width:180px;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:18px;letter-spacing:4px;text-transform:uppercase;font-family:monospace;text-align:center;font-weight:bold}
        .code-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(102,126,234,.2)}
        .code-status{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:500}
        .code-status.active{background:#c6f6d5;color:#276749}
        .code-status.inactive{background:#fed7d7;color:#9b2c2c}
        
        /* 分享区域 */
        .share-section{display:none}
        .share-section.show{display:block}
        .url-box{display:flex;gap:10px;margin:10px 0}
        .url-input{flex:1;padding:10px 15px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:monospace;background:white}
        .code-display{font-size:36px;font-weight:700;letter-spacing:8px;color:var(--primary);text-align:center;padding:15px;font-family:monospace}
        .url-hint{color:var(--light);font-size:12px;margin-top:5px}
        .file-summary{margin-top:10px}
        .file-mini-list{list-style:none;max-height:200px;overflow-y:auto;padding:10px;background:#f8f9fa;border-radius:8px}
        .file-mini-list li{padding:5px 0;border-bottom:1px solid #eee;font-size:13px}
        .toast{position:fixed;top:20px;right:20px;padding:15px 25px;color:white;border-radius:8px;z-index:1000;animation:fadeIn .3s}
        .toast-success{background:var(--success)}
        .toast-error{background:var(--danger)}
        .toast-info{background:var(--primary)}
        
        @media(max-width:600px){
            .container{padding:10px}
            .navbar{flex-direction:column;gap:10px}
            .code-input-row{flex-direction:column}
            .btn-large{width:100%}
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="/" class="nav-brand">📁 FileP2P</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/web/sender.html" class="active">发送</a>
                <a href="/web/receiver.html">接收</a>
            </div>
        </nav>

        <div class="card" id="info-section">
            <div class="info-icon">📤</div>
            <h2 style="text-align:center;">发送文件</h2>
            
            <div style="text-align:center;">
                <h3>📋 操作步骤</h3>
                <ol class="instruction-list">
                    <li>将文件放入 <code class="path-highlight">files</code> 文件夹</li>
                    <li>设置访问码保护（可选）</li>
                    <li>点击"生成分享链接"</li>
                    <li>将链接发送给接收方</li>
                </ol>
            </div>

            <!-- 访问码设置 -->
            <div class="access-code-section">
                <h4>🔑 访问码保护</h4>
                
                <label class="toggle-row">
                    <span class="toggle-switch">
                        <input type="checkbox" id="enable-code" onchange="toggleCode()">
                        <span class="slider"></span>
                    </span>
                    <span class="toggle-label">启用访问码（接收方需要输入才能查看文件）</span>
                </label>
                
                <div class="code-controls" id="code-controls">
                    <div class="code-input-row">
                        <input type="text" class="code-input" id="code-input" placeholder="输入访问码" maxlength="10">
                        <button class="btn btn-secondary btn-sm" onclick="randomCode()">🎲 随机</button>
                        <button class="btn btn-success btn-sm" onclick="applyCode()">✅ 应用</button>
                        <button class="btn btn-danger btn-sm" onclick="clearCode()">🗑 清除</button>
                    </div>
                    <div class="code-status inactive" id="code-status">当前无访问码保护</div>
                </div>
            </div>

            <button class="btn btn-primary btn-large" onclick="generateShare()" id="share-btn">
                🚀 生成分享链接
            </button>
        </div>

        <!-- 分享结果 -->
        <div class="share-section" id="share-section">
            <div class="card">
                <h2 style="text-align:center;">🔗 分享链接已生成</h2>
                
                <div style="margin:20px 0;">
                    <h4>📡 局域网访问地址</h4>
                    <div class="url-box">
                        <input type="text" id="local-url" readonly class="url-input">
                        <button class="btn btn-secondary" onclick="copyUrl()">📋 复制</button>
                    </div>
                    <p class="url-hint">同一网络下的设备使用此地址访问</p>
                </div>

                <div id="code-card" style="display:none;margin:20px 0;background:#fffbeb;border:2px solid #f6e05e;border-radius:12px;padding:20px;text-align:center;">
                    <h4>🔑 访问码</h4>
                    <div class="code-display" id="code-display"></div>
                    <p style="color:#975a16;font-size:13px;margin-top:8px;">⚠️ 接收方需要输入此访问码</p>
                </div>

                <div style="margin:20px 0;">
                    <h4>📋 共享文件 (<span id="file-count">0</span> 个)</h4>
                    <div class="file-summary" id="file-list"></div>
                </div>

                <button class="btn btn-primary" onclick="generateShare()">🔄 刷新</button>
            </div>
        </div>
    </div>

    <script>
        let hasCode = false;
        let currentCode = null;

        // 初始化
        (async () => {
            try {
                const r = await fetch('/api/share');
                const d = await r.json();
                if (d.has_access_code) {
                    hasCode = true;
                    currentCode = d.access_code;
                    document.getElementById('enable-code').checked = true;
                    document.getElementById('code-controls').classList.add('show');
                    document.getElementById('code-input').value = currentCode;
                    document.getElementById('code-status').textContent = '✅ 当前访问码: ' + currentCode;
                    document.getElementById('code-status').className = 'code-status active';
                }
            } catch(e) {}
        })();

        function toggleCode() {
            const on = document.getElementById('enable-code').checked;
            document.getElementById('code-controls').classList.toggle('show', on);
            if (!on) clearCode();
        }

        function randomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let c = '';
            for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
            document.getElementById('code-input').value = c;
        }

        async function applyCode() {
            const code = document.getElementById('code-input').value.trim();
            if (!code) {
                // 自动生成
                const r = await fetch('/api/set-access-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'generate'})
                });
                const d = await r.json();
                if (d.success) {
                    hasCode = true;
                    currentCode = d.access_code;
                    document.getElementById('code-input').value = currentCode;
                    document.getElementById('code-status').textContent = '✅ 访问码: ' + currentCode;
                    document.getElementById('code-status').className = 'code-status active';
                    toast('已生成随机访问码', 'success');
                }
            } else {
                const r = await fetch('/api/set-access-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'set', code})
                });
                const d = await r.json();
                if (d.success) {
                    hasCode = true;
                    currentCode = d.access_code;
                    document.getElementById('code-status').textContent = '✅ 访问码: ' + currentCode;
                    document.getElementById('code-status').className = 'code-status active';
                    toast('访问码已设置', 'success');
                } else {
                    toast(d.error || '设置失败', 'error');
                }
            }
        }

        async function clearCode() {
            const r = await fetch('/api/set-access-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'clear'})
            });
            const d = await r.json();
            if (d.success) {
                hasCode = false;
                currentCode = null;
                document.getElementById('enable-code').checked = false;
                document.getElementById('code-controls').classList.remove('show');
                document.getElementById('code-input').value = '';
                document.getElementById('code-status').textContent = '当前无访问码保护';
                document.getElementById('code-status').className = 'code-status inactive';
                toast('访问码已清除', 'info');
            }
        }

        async function generateShare() {
            const btn = document.getElementById('share-btn');
            btn.textContent = '⏳ 生成中...';
            btn.disabled = true;

            try {
                const r = await fetch('/api/share');
                const d = await r.json();

                if (d.success) {
                    document.getElementById('info-section').style.display = 'none';
                    document.getElementById('share-section').classList.add('show');

                    document.getElementById('local-url').value = d.local_url;
                    document.getElementById('file-count').textContent = d.file_count;

                    // 访问码
                    if (d.has_access_code) {
                        document.getElementById('code-card').style.display = 'block';
                        document.getElementById('code-display').textContent = d.access_code;
                    } else {
                        document.getElementById('code-card').style.display = 'none';
                    }

                    // 文件列表
                    const fl = document.getElementById('file-list');
                    if (d.files.length > 0) {
                        let total = 0;
                        fl.innerHTML = `
                            <p style="margin-bottom:10px;">总大小: <strong>${formatSize(d.total_size)}</strong></p>
                            <ul class="file-mini-list">
                                ${d.files.map(f => { total += f.size; return `<li>📎 ${f.name} (${formatSize(f.size)})</li>`; }).join('')}
                            </ul>`;
                    } else {
                        fl.innerHTML = '<p style="color:#f56565;">⚠️ 文件夹为空，请放入文件后刷新</p>';
                    }

                    toast('✅ ' + d.message, 'success');
                } else {
                    toast('❌ ' + (d.error || '生成失败'), 'error');
                }
            } catch(e) {
                toast('❌ 请求失败: ' + e.message, 'error');
            } finally {
                btn.textContent = '🚀 生成分享链接';
                btn.disabled = false;
            }
        }

        function copyUrl() {
            const inp = document.getElementById('local-url');
            inp.select();
            document.execCommand('copy');
            toast('✅ 已复制！发送给接收方即可', 'success');
        }

        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        function formatSize(b) {
            const u = ['B','KB','MB','GB','TB'];
            let i = 0;
            while (b >= 1024 && i < u.length-1) { b /= 1024; i++; }
            return b.toFixed(1) + ' ' + u[i];
        }
    </script>
</body>
</html>
